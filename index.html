<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet Smart AI V7 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-sidebar { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .dark-mode { background-color: #131314; color: #e3e3e3; }
        .chat-container { height: calc(100vh - 160px); }
        #loading-screen { position: fixed; inset: 0; background: #131314; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .user-msg { background: #2f2f2f; border-radius: 18px 18px 2px 18px; }
        .ai-msg { background: transparent; }
        pre { background: #1e1e1e; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        code { font-family: 'Courier New', monospace; color: #64ffda; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="dark-mode min-h-screen flex flex-col">

    <div id="loading-screen">
        <div class="text-xl font-medium animate-pulse">Initializing V7 PRO...</div>
    </div>

    <header class="flex items-center justify-between p-4 border-b border-gray-800 lg:hidden">
        <button id="menu-toggle" class="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        <h1 class="font-semibold">Sweet Smart AI</h1>
        <button onclick="toggleSettings()" class="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 glass-sidebar border-r border-gray-800 z-50 sidebar-transition -translate-x-full lg:translate-x-0 lg:static lg:block">
            <div class="p-4 flex flex-col h-full">
                <button onclick="newChat()" class="flex items-center gap-3 w-full p-3 rounded-full bg-gray-800 hover:bg-gray-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span>New Chat</span>
                </button>
                <div id="chat-history" class="mt-6 flex-1 overflow-y-auto space-y-2">
                    </div>
                <div class="pt-4 border-t border-gray-800 hidden lg:block">
                    <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-800 rounded">
                        <span>Settings</span>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative w-full">
            <div id="chat-display" class="chat-container overflow-y-auto p-4 md:p-10 space-y-6">
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                    <div class="text-4xl">🐱</div>
                    <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                    <p class="text-gray-400 max-w-md">V7 PRO is ready for code, images, and deep information.</p>
                </div>
            </div>

            <div class="p-4 bg-transparent">
                <div class="max-w-3xl mx-auto relative flex items-end gap-2 bg-[#1e1e20] rounded-2xl p-2 border border-gray-700 shadow-xl">
                    <textarea id="user-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent border-none text-white p-3 outline-none resize-none max-h-40" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="send-btn" class="p-3 bg-white text-black rounded-xl hover:bg-gray-200 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <p class="text-center text-[10px] text-gray-500 mt-2">V7 PRO can make mistakes. Verify important info.</p>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden p-4">
        <div class="bg-[#1e1e20] w-full max-w-md rounded-3xl p-6 border border-gray-700">
            <h3 class="text-xl font-bold mb-4">AI Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key-input" class="w-full bg-[#131314] border border-gray-700 rounded-lg p-3 outline-none focus:border-white transition">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">AI Model</label>
                    <select id="model-select" class="w-full bg-[#131314] border border-gray-700 rounded-lg p-3 outline-none">
                        <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
                        <option value="google/gemini-pro-1.5">Gemini Pro 1.5</option>
                        <option value="meta-llama/llama-3-70b-instruct">Llama 3 70B</option>
                    </select>
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-black font-bold py-3 rounded-xl mt-4">Save Configuration</button>
                <button onclick="toggleSettings()" class="w-full text-gray-400 py-2">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- Core Logic ---
        let chatHistory = JSON.parse(localStorage.getItem('v7_history')) || [];
        let currentChatId = null;

        const display = document.getElementById('chat-display');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modal = document.getElementById('settings-modal');
        const sidebar = document.getElementById('sidebar');

        // Init App
        window.onload = () => {
            document.getElementById('loading-screen').style.display = 'none';
            if (!localStorage.getItem('v7_api_key')) toggleSettings();
            renderHistory();
        };

        function toggleSettings() {
            modal.classList.toggle('hidden');
            document.getElementById('api-key-input').value = localStorage.getItem('v7_api_key') || '';
            document.getElementById('model-select').value = localStorage.getItem('v7_model') || 'deepseek/deepseek-r1:free';
        }

        function saveSettings() {
            localStorage.setItem('v7_api_key', document.getElementById('api-key-input').value);
            localStorage.setItem('v7_model', document.getElementById('model-select').value);
            toggleSettings();
            alert("Settings Saved!");
        }

        async function handleSend() {
            const text = input.value.trim();
            const apiKey = localStorage.getItem('v7_api_key');
            if (!text || !apiKey) return;

            document.getElementById('welcome').classList.add('hidden');
            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const aiBubble = appendMessage('ai', '<span class="animate-pulse">Thinking...</span>');
            
            // Image logic check
            if (text.toLowerCase().includes("image") || text.toLowerCase().includes("banao")) {
                const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
                aiBubble.innerHTML = `Generating image...<br><img src="${imgUrl}" class="mt-4 rounded-xl border border-gray-700" onload="scrollBottom()">`;
                return;
            }

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": localStorage.getItem('v7_model') || "deepseek/deepseek-r1:free",
                        "messages": [{"role": "user", "content": text}]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiBubble.innerHTML = marked.parse(aiText);
                saveChat(text, aiText);
            } catch (e) {
                aiBubble.innerText = "Error: Check API Key or Connection.";
            }
            scrollBottom();
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[85%] p-4 ${role === 'user' ? 'user-msg' : 'ai-msg'}">
                    <div class="text-sm font-bold mb-1 opacity-50">${role === 'user' ? 'You' : 'AI Assistant'}</div>
                    <div class="message-text">${content}</div>
                </div>
            `;
            display.appendChild(div);
            scrollBottom();
            return div.querySelector('.message-text');
        }

        function saveChat(userText, aiText) {
            const newChat = { id: Date.now(), title: userText.substring(0, 20), user: userText, ai: aiText };
            chatHistory.unshift(newChat);
            localStorage.setItem('v7_history', JSON.stringify(chatHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatHistory.map(chat => `
                <div class="p-3 rounded-lg hover:bg-gray-800 cursor-pointer text-sm truncate border border-transparent hover:border-gray-700 transition" onclick="loadChat(${chat.id})">
                    ${chat.title}...
                </div>
            `).join('');
        }

        function loadChat(id) {
            const chat = chatHistory.find(c => c.id === id);
            document.getElementById('welcome').classList.add('hidden');
            display.innerHTML = '';
            appendMessage('user', chat.user);
            appendMessage('ai', marked.parse(chat.ai));
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function newChat() {
            display.innerHTML = `
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                    <div class="text-4xl">🐱</div>
                    <h2 class="text-2xl font-semibold">Ready for a new start?</h2>
                </div>`;
            input.value = '';
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
        }

        function scrollBottom() { display.scrollTop = display.scrollHeight; }

        sendBtn.addEventListener('click', handleSend);
        document.getElementById('menu-toggle').addEventListener('click', toggleSidebar);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    </script>
</body>
</html>
