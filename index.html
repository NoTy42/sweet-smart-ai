<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 Sweet Smart AI - V7 PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <header class="v7-header">
            <div class="header-content">
                <span class="logo">🐱 Sweet Smart AI</span>
                <span class="v7-badge">V7 PRO</span>
            </div>
            <button id="clearBtn" class="utility-btn">New Chat</button>
        </header>

        <main id="messages" class="chat-flow">
            </main>

        <footer class="v7-input-section">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask anything or generate images..." rows="1"></textarea>
                <button id="sendBtn" class="pro-send-btn">
                    <i data-lucide="arrow-up"></i>
                </button>
            </div>
            <p class="disclaimer">V7 Edition • Gemini 1.5 Flash</p>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
