
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Workspace V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #0b0b0c; color: #e1e1e1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; }
        .user-style { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
        .ai-style { background: #1e1e20; border: 1px solid #333; border-bottom-left-radius: 4px; }
        pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #444; position: relative; }
        code { color: #f8f8f2; font-family: 'Consolas', monospace; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #444; color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; }
        .copy-btn:hover { background: #666; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#131314]">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">AI V8 UNIVERSAL</h1>
        <button onclick="openModal()" class="p-2 bg-gray-800 rounded-full hover:bg-gray-700 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </nav>

    <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="text-center text-gray-600 mt-10">
            <p>Koi bhi model ID dalein aur chat shuru karein.</p>
            <p class="text-xs mt-2">Example: cstepfun/step-3.5-flash:free</p>
        </div>
    </div>

    <div class="p-4 bg-[#131314] border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <textarea id="msg-input" rows="1" class="flex-1 bg-transparent border border-gray-700 rounded-xl p-3 outline-none focus:border-blue-500 resize-none" placeholder="Poochiye kya poochna hai..."></textarea>
            <button id="send-btn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-700 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div id="config-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-[#1c1c1e] p-6 rounded-2xl w-full max-w-sm border border-gray-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Settings</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="text-xs text-gray-500 font-bold block mb-1">OPENROUTER API KEY</label>
                    <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full bg-black border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-xs text-gray-500 font-bold block mb-1">MODEL ID (UNIVERSAL)</label>
                    <input type="text" id="model-id" placeholder="e.g. google/gemini-2.0-flash-001" class="w-full bg-black border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500">
                    <p class="text-[10px] text-gray-600 mt-1 italic">Yahan aap koi bhi naya model ID dal sakte hain.</p>
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition mt-2">Save Settings</button>
                <button onclick="closeModal()" class="w-full text-gray-500 py-2">Close</button>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msg-input');
        const modal = document.getElementById('config-modal');

        function openModal() {
            document.getElementById('api-key').value = localStorage.getItem('or_key') || '';
            document.getElementById('model-id').value = localStorage.getItem('or_model') || 'google/gemini-2.0-flash-001';
            modal.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }

        function saveSettings() {
            localStorage.setItem('or_key', document.getElementById('api-key').value.trim());
            localStorage.setItem('or_model', document.getElementById('model-id').value.trim());
            closeModal();
            alert("Settings Updated!");
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            const key = localStorage.getItem('or_key');
            const model = localStorage.getItem('or_model') || 'google/gemini-2.0-flash-001';

            if (!text || !key) return alert("Settings mein API Key dalein!");

            appendMessage('user', text);
            msgInput.value = '';
            
            const aiBubble = appendMessage('ai', 'Thinking...');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": model,
                        "messages": [{ "role": "user", "content": text }]
                    })
                });

                const data = await response.json();
                const resultText = data.choices[0].message.content;
                aiBubble.innerHTML = marked.parse(resultText);
                
                // Adding copy button to code blocks
                aiBubble.querySelectorAll('pre').forEach(block => {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(block.innerText.replace('Copy', ''));
                        btn.innerText = 'Copied!';
                        setTimeout(() => btn.innerText = 'Copy', 1500);
                    };
                    block.appendChild(btn);
                });
            } catch (error) {
                aiBubble.innerText = "Error: Model ID ya API key check karein.";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendMessage(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            wrapper.innerHTML = `<div class="chat-bubble ${role === 'user' ? 'user-style' : 'ai-style'} shadow-md">${content}</div>`;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return wrapper.querySelector('.chat-bubble');
        }

        document.getElementById('send-btn').onclick = sendMessage;
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});
    </script>
</body>
</html>
